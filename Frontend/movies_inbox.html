<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies Inbox</title>
    <link rel="stylesheet" href="movies_inbox.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <button class="back-button" onclick="window.history.back()"></button>
        </div>

        <div class="content">
            <div class="form-section">
                <form id="moviesInboxForm">
                    <div class="form-group">
                        <label for="movieTitle">Movie Title</label>
                        <input type="text" id="movieTitle" name="movieTitle" required>
                    </div>

                    <div class="form-group">
                        <label for="movieDescription">Movie Description</label>
                        <textarea id="movieDescription" name="movieDescription" required></textarea>
                    </div>

                    <div class="form-group">
                        <label for="movieImage">Movie Image</label>
                        <input type="file" id="movieImage" name="movieImage" required>
                    </div>

                    <button type="submit" class="submit-button">Submit</button>
                </form>
            </div>

            <div class="image-section">
                <img src="movie_image.jpg" alt="Movie Image">
            </div>
        </div>
    </div>

    <script>
        document.getElementById('moviesInboxForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const movieTitle = document.getElementById('movieTitle').value;
            const movieDescription = document.getElementById('movieDescription').value;
            const movieImage = document.getElementById('movieImage').value;

            console.log('Movie Title:', movieTitle);
            console.log('Movie Description:', movieDescription);
            console.log('Movie Image:', movieImage);

            alert('Movie inbox submitted successfully!');
        });
    </script>
</body>

</html>
